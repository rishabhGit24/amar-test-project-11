<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Countdown to 2027</title>
  <style>
    /*
     * DESIGN CONCEPT: "Void Luxe"
     * Deep-space darkness meets electric aurora — magenta-violet plasma
     * bleeds through the void, monospaced digits read like mission hardware,
     * frosted-glass cards float as if lit from within.
     * One dominant hue: deep violet #1a0033
     * Electric accent: magenta #c2185b + cobalt #0d47a1
     */

    /* ── Tokens ─────────────────────────────────────────── */
    :root {
      --col-void:    #1a0033;
      --col-magenta: #c2185b;
      --col-cobalt:  #0d47a1;
      --col-white:   #ffffff;
      --col-dim:     rgba(255,255,255,0.7);
      --col-dimmer:  rgba(255,255,255,0.6);
      --col-sep:     rgba(255,255,255,0.4);
      --col-glass:   rgba(255,255,255,0.08);
      --col-glass-h: rgba(255,255,255,0.14);
      --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
      --shadow-card-h: 0 12px 40px rgba(194,24,91,0.35), 0 4px 16px rgba(0,0,0,0.4);
      --radius: 12px;
      --blur: blur(6px);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Animated gradient background ───────────────────── */
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Ambient aurora glow orbs */
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.55; }
      33%       { transform: translate(40px, -30px) scale(1.08); opacity: 0.7; }
      66%       { transform: translate(-25px, 20px) scale(0.95); opacity: 0.5; }
    }

    /* Card entrance */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(28px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Digit roll flash */
    @keyframes digitPop {
      0%   { opacity: 0.4; transform: scaleY(0.85); }
      60%  { opacity: 1;   transform: scaleY(1.04); }
      100% { opacity: 1;   transform: scaleY(1); }
    }

    /* Heading shimmer */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }

    /* Grain overlay pulse */
    @keyframes grainMove {
      0%,100% { transform: translate(0,0); }
      20%     { transform: translate(-2px, 2px); }
      40%     { transform: translate(2px, -1px); }
      60%     { transform: translate(-1px, 3px); }
      80%     { transform: translate(3px, -2px); }
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: linear-gradient(
        135deg,
        var(--col-void) 0%,
        #2d0050 18%,
        var(--col-magenta) 38%,
        #6a0dad 55%,
        var(--col-cobalt) 72%,
        #0a1a4a 88%,
        var(--col-void) 100%
      );
      background-size: 300% 300%;
      animation: gradientShift 12s ease-in-out infinite alternate;
      position: relative;
    }

    /* Grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
      animation: grainMove 0.15s steps(1) infinite;
    }

    /* Aurora orb 1 */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(194,24,91,0.28) 0%, transparent 70%);
      top: -120px;
      right: -80px;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 9s ease-in-out infinite;
    }

    /* ── Layout ──────────────────────────────────────────── */
    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    /* Second aurora orb via pseudo on main */
    main::before {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(13,71,161,0.3) 0%, transparent 70%);
      bottom: -100px;
      left: -60px;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 11s ease-in-out infinite reverse;
    }

    /* ── Heading ─────────────────────────────────────────── */
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: var(--col-white);
      letter-spacing: 0.05em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      margin-bottom: 2.5rem;
      line-height: 1.1;
      /* Shimmer gradient clip */
      background: linear-gradient(
        90deg,
        #fff 20%,
        rgba(255,180,220,0.9) 40%,
        #fff 50%,
        rgba(180,200,255,0.9) 60%,
        #fff 80%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite, riseIn 0.7s var(--ease-spring) both;
    }

    /* ── Timer row ───────────────────────────────────────── */
    #timer {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: nowrap;
    }

    /* ── Separator dots ──────────────────────────────────── */
    .sep {
      color: var(--col-sep);
      font-size: clamp(2rem, 6vw, 4rem);
      align-self: center;
      line-height: 1;
      user-select: none;
      text-shadow: 0 0 12px rgba(194,24,91,0.5);
    }

    /* ── Digit blocks ────────────────────────────────────── */
    .block {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1.5rem;
      background: var(--col-glass);
      border-radius: var(--radius);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      animation: riseIn 0.7s var(--ease-spring) both;
      min-width: 5.5rem;
    }

    .block:nth-child(1) { animation-delay: 0.05s; }
    .block:nth-child(3) { animation-delay: 0.15s; }
    .block:nth-child(5) { animation-delay: 0.25s; }
    .block:nth-child(7) { animation-delay: 0.35s; }

    .block:hover,
    .block:focus-within {
      transform: translateY(-4px);
      box-shadow: var(--shadow-card-h), inset 0 1px 0 rgba(255,255,255,0.18);
      background: var(--col-glass-h);
    }

    /* ── Digits ──────────────────────────────────────────── */
    .digits {
      display: block;
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(3rem, 12vw, 7rem);
      font-weight: 700;
      color: var(--col-white);
      line-height: 1;
      letter-spacing: -0.02em;
      text-shadow:
        0 0 30px rgba(194,24,91,0.6),
        0 0 60px rgba(194,24,91,0.2),
        0 2px 4px rgba(0,0,0,0.5);
      transition: opacity 0.1s ease;
    }

    .digits.pop {
      animation: digitPop 0.25s ease-out both;
    }

    /* ── Labels ──────────────────────────────────────────── */
    .label {
      display: block;
      font-size: clamp(0.6rem, 2vw, 0.85rem);
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--col-dim);
      margin-top: 0.4em;
      text-transform: uppercase;
    }

    /* ── Subline ─────────────────────────────────────────── */
    .subline {
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      color: var(--col-dimmer);
      margin-top: 2rem;
      font-style: italic;
      letter-spacing: 0.03em;
      animation: riseIn 0.7s var(--ease-spring) 0.5s both;
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 480px) {
      #timer {
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.6rem;
      }
      .sep { display: none; }
      .block { min-width: 4.5rem; padding: 0.75rem 1rem; }
      h1 { margin-bottom: 1.75rem; }
    }

    @media (min-width: 481px) {
      .sep { display: inline; }
    }

    /* ── Reduced motion ──────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Countdown to 2027</h1>

    <div id="timer" role="timer" aria-live="polite" aria-label="Time remaining until 2027">
      <div class="block" tabindex="0">
        <span class="digits" id="days">000</span>
        <span class="label">Days</span>
      </div>
      <span class="sep" aria-hidden="true">·</span>
      <div class="block" tabindex="0">
        <span class="digits" id="hours">00</span>
        <span class="label">Hours</span>
      </div>
      <span class="sep" aria-hidden="true">·</span>
      <div class="block" tabindex="0">
        <span class="digits" id="minutes">00</span>
        <span class="label">Minutes</span>
      </div>
      <span class="sep" aria-hidden="true">·</span>
      <div class="block" tabindex="0">
        <span class="digits" id="seconds">00</span>
        <span class="label">Seconds</span>
      </div>
    </div>

    <p class="subline" id="subline">Bring on the new year.</p>
  </main>

  <script>
    (function () {
      'use strict';

      var target   = new Date('2027-01-01T00:00:00').getTime();
      var daysEl   = document.getElementById('days');
      var hoursEl  = document.getElementById('hours');
      var minsEl   = document.getElementById('minutes');
      var secsEl   = document.getElementById('seconds');
      var subline  = document.getElementById('subline');
      var tickCount = 0;
      var handle;

      function pad(n, len) {
        return String(Math.max(0, n)).padStart(len, '0');
      }

      function popDigit(el, val) {
        if (el.textContent === val) return;
        el.textContent = val;
        el.classList.remove('pop');
        // Force reflow to restart animation
        void el.offsetWidth;
        el.classList.add('pop');
      }

      function tick() {
        var now  = Date.now();
        var diff = target - now;

        if (diff <= 0) {
          popDigit(daysEl,  '000');
          popDigit(hoursEl, '00');
          popDigit(minsEl,  '00');
          popDigit(secsEl,  '00');
          subline.textContent = 'Happy New Year 2027! 🎉';
          clearInterval(handle);
          return;
        }

        var totalSecs = Math.floor(diff / 1000);
        var secs  = totalSecs % 60;
        var totalMins = Math.floor(totalSecs / 60);
        var mins  = totalMins % 60;
        var totalHrs = Math.floor(totalMins / 60);
        var hrs   = totalHrs % 24;
        var days  = Math.floor(totalHrs / 24);

        popDigit(daysEl,  pad(days, 3));
        popDigit(hoursEl, pad(hrs,  2));
        popDigit(minsEl,  pad(mins, 2));
        popDigit(secsEl,  pad(secs, 2));

        // Throttle aria-live announcements to once per minute
        tickCount++;
        if (tickCount % 60 === 1) {
          var timer = document.getElementById('timer');
          timer.setAttribute('aria-label',
            pad(days,3) + ' days, ' + pad(hrs,2) + ' hours, ' +
            pad(mins,2) + ' minutes, ' + pad(secs,2) + ' seconds remaining until 2027'
          );
        }
      }

      // Run immediately, then every second
      tick();
      handle = setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
