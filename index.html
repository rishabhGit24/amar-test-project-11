<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pomodoro · Focus Timer</title>
<style>
/*
 * DESIGN CONCEPT: "Void Violet"
 * Deep-space near-black with electric violet plasma bleeding through the void.
 * A single glowing ring floats like a mission-control instrument — monospaced
 * digits read like countdown hardware, ambient orbs breathe in the dark.
 * Dominant hue: near-black #0d0d14 · Electric accent: violet #7c3aed
 */

/* ── Tokens ─────────────────────────────────────────── */
:root {
  --bg-base:        #0d0d14;
  --bg-grad-a:      #12003a;
  --bg-grad-b:      #1a0050;
  --accent:         #7c3aed;
  --accent-glow:    rgba(124,58,237,0.45);
  --accent-dim:     rgba(124,58,237,0.25);
  --text-primary:   #f0eeff;
  --text-dim:       rgba(240,238,255,0.5);
  --ring-track:     rgba(124,58,237,0.18);
  --ring-stroke:    #7c3aed;
  --btn-bg:         rgba(124,58,237,0.15);
  --btn-border:     rgba(124,58,237,0.4);
  --btn-hover-bg:   rgba(124,58,237,0.3);
  --radius-btn:     8px;
  --transition:     0.2s ease;
}

/* ── Reset ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Keyframes ──────────────────────────────────────── */
@keyframes gradShift {
  0%   { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}
@keyframes orbFloat {
  0%,100% { transform: translate(0,0) scale(1);    opacity: 0.6; }
  33%      { transform: translate(30px,-25px) scale(1.1); opacity: 0.8; }
  66%      { transform: translate(-20px,18px) scale(0.93); opacity: 0.5; }
}
@keyframes ringFlash {
  0%,100% { stroke: var(--accent); opacity: 1; }
  50%      { stroke: #fff;          opacity: 0.4; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Body / background ──────────────────────────────── */
html, body {
  height: 100%;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100%;
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, var(--bg-grad-a), var(--bg-base), var(--bg-grad-b));
  background-size: 300% 300%;
  animation: gradShift 14s ease-in-out infinite alternate;
  position: relative;
  overflow: hidden;
}

/* Ambient orb 1 — top-right violet */
body::before {
  content: '';
  position: fixed;
  width: 520px; height: 520px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,0.32) 0%, transparent 70%);
  top: -140px; right: -100px;
  pointer-events: none;
  z-index: 0;
  animation: orbFloat 10s ease-in-out infinite;
}

/* Ambient orb 2 — bottom-left violet */
body::after {
  content: '';
  position: fixed;
  width: 440px; height: 440px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(109,40,217,0.28) 0%, transparent 70%);
  bottom: -120px; left: -80px;
  pointer-events: none;
  z-index: 0;
  animation: orbFloat 13s ease-in-out infinite reverse;
}

/* ── Layout ─────────────────────────────────────────── */
main {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2.5rem 1.5rem;
  text-align: center;
  animation: fadeUp 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}

/* ── Ring wrapper (positions digits over SVG) ───────── */
.ring-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

/* ── SVG ring ───────────────────────────────────────── */
#ring {
  width: min(60vw, 280px);
  height: min(60vw, 280px);
  overflow: visible;
}

#ring-progress {
  transform: rotate(-90deg);
  transform-origin: center;
  filter: drop-shadow(0 0 8px var(--accent-glow));
  transition: stroke-dashoffset 0.9s cubic-bezier(0.4,0,0.2,1);
}

#ring-progress.ring-flash {
  animation: ringFlash 0.7s ease-in-out 6 both;
}

/* ── Digit display ──────────────────────────────────── */
#display {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', Courier, monospace;
  font-size: clamp(3rem, 12vw, 5rem);
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  text-shadow: 0 0 24px var(--accent-glow), 0 2px 4px rgba(0,0,0,0.6);
  user-select: none;
  pointer-events: none;
}

/* ── Controls ───────────────────────────────────────── */
#controls {
  display: flex;
  flex-direction: row;
  gap: 1rem;
  align-items: center;
  justify-content: center;
  margin-top: 2rem;
}

#controls button {
  padding: 0.65rem 1.6rem;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  border-radius: var(--radius-btn);
  color: var(--text-primary);
  cursor: pointer;
  transition:
    background var(--transition),
    box-shadow var(--transition),
    transform var(--transition),
    opacity var(--transition);
  outline: none;
}

#btn-start {
  box-shadow: 0 0 12px var(--accent-dim);
}

#controls button:hover:not(:disabled) {
  background: var(--btn-hover-bg);
  box-shadow: 0 0 16px var(--accent-glow);
  transform: translateY(-2px);
}

#controls button:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
}

#controls button:active:not(:disabled) {
  transform: translateY(0);
}

#controls button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  box-shadow: none;
}

/* ── Status message ─────────────────────────────────── */
#status {
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.4s ease, visibility 0.4s ease;
  color: var(--text-primary);
  font-size: clamp(1rem, 3vw, 1.4rem);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 1.5rem;
  text-shadow: 0 0 20px var(--accent-glow);
}

#status.visible {
  opacity: 1;
  visibility: visible;
}

/* ── Responsive ─────────────────────────────────────── */
@media (max-width: 480px) {
  #ring {
    width: min(80vw, 240px);
    height: min(80vw, 240px);
  }
  #display {
    font-size: clamp(2.5rem, 12vw, 4rem);
  }
  #controls button {
    padding: 0.55rem 1.1rem;
    font-size: 0.85rem;
  }
}

/* ── Reduced motion ─────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
<main role="main">

  <!-- Ring + digit overlay -->
  <div class="ring-wrap"
       role="timer"
       aria-live="off"
       aria-label="25 minutes 0 seconds remaining"
       id="ring-wrap">

    <svg id="ring" viewBox="0 0 280 280" aria-hidden="true">
      <!-- Track -->
      <circle
        cx="140" cy="140" r="120"
        fill="none"
        stroke="var(--ring-track)"
        stroke-width="14"
      />
      <!-- Progress arc -->
      <circle
        id="ring-progress"
        cx="140" cy="140" r="120"
        fill="none"
        stroke="var(--ring-stroke)"
        stroke-width="14"
        stroke-linecap="round"
        stroke-dasharray="753.98"
        stroke-dashoffset="0"
      />
    </svg>

    <div id="display" aria-hidden="true">25:00</div>
  </div>

  <!-- Buttons -->
  <div id="controls">
    <button id="btn-start" aria-label="Start timer">Start</button>
    <button id="btn-pause" aria-label="Pause timer" disabled>Pause</button>
    <button id="btn-reset" aria-label="Reset timer">Reset</button>
  </div>

  <!-- Status -->
  <p id="status" aria-live="polite">Break time</p>

</main>

<script>
(function () {
  'use strict';

  var TOTAL       = 25 * 60;
  var CIRCUMFERENCE = 2 * Math.PI * 120; // ≈ 753.98

  var remaining  = TOTAL;
  var running    = false;
  var intervalId = null;

  var displayEl  = document.getElementById('display');
  var progressEl = document.getElementById('ring-progress');
  var wrapEl     = document.getElementById('ring-wrap');
  var statusEl   = document.getElementById('status');
  var btnStart   = document.getElementById('btn-start');
  var btnPause   = document.getElementById('btn-pause');
  var btnReset   = document.getElementById('btn-reset');

  function pad(n) {
    return String(n).padStart(2, '0');
  }

  function updateDisplay() {
    var m = Math.floor(remaining / 60);
    var s = remaining % 60;
    displayEl.textContent = pad(m) + ':' + pad(s);

    var offset = CIRCUMFERENCE * (1 - remaining / TOTAL);
    progressEl.setAttribute('stroke-dashoffset', String(offset));

    var label = m + ' minute' + (m !== 1 ? 's' : '') +
                ' ' + s + ' second' + (s !== 1 ? 's' : '') + ' remaining';
    wrapEl.setAttribute('aria-label', label);
  }

  function setButtons(isRunning) {
    btnStart.disabled = isRunning;
    btnPause.disabled = !isRunning;
  }

  function pause() {
    if (intervalId !== null) {
      clearInterval(intervalId);
      intervalId = null;
    }
    running = false;
    setButtons(false);
  }

  function tick() {
    remaining -= 1;
    updateDisplay();
    if (remaining <= 0) {
      pause();
      statusEl.classList.add('visible');
      // Flash animation
      progressEl.classList.remove('ring-flash');
      void progressEl.offsetWidth; // reflow
      progressEl.classList.add('ring-flash');
      progressEl.addEventListener('animationend', function onEnd() {
        progressEl.removeEventListener('animationend', onEnd);
        progressEl.classList.remove('ring-flash');
      });
    }
  }

  function start() {
    if (remaining > 0 && !running) {
      running = true;
      setButtons(true);
      intervalId = setInterval(tick, 1000);
    }
  }

  function reset() {
    pause();
    remaining = TOTAL;
    statusEl.classList.remove('visible');
    progressEl.classList.remove('ring-flash');
    updateDisplay();
    setButtons(false);
  }

  btnStart.addEventListener('click', start);
  btnPause.addEventListener('click', pause);
  btnReset.addEventListener('click', reset);

  // Initial render
  updateDisplay();
  setButtons(false);

})();
</script>
</body>
</html>
